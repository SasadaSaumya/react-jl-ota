plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.astrivix.reactjlota'
version = '1.0.5'

android {
  namespace "com.astrivix.reactjlota"
  defaultConfig {
    versionCode 7
    versionName "1.0.5"
    // The JieLi OTA AAR ships native .so files for these ABIs only.
    ndk {
      abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
    }
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // JieLi Bluetooth OTA SDK (jl_bt_ota_*.aar) lives in android/libs.
  implementation fileTree(dir: 'libs', include: ['*.aar'])

  // The only external symbols the AAR references.
  implementation 'androidx.annotation:annotation:1.7.1'
  implementation 'androidx.core:core-ktx:1.12.0'
}
